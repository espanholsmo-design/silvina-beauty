            font-weight: 600;

            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;

        .filter-btn:hover,

            background: #d4a574;
            color: white;
            border-color: #d4a574;
        }

        .products-container {

            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            border: 1px solid #f0ebe3;
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-4px);

        }

        .product-category {
            font-size: 11px;
            color: #d4a574;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-name {

            font-size: 15px;
            color: #8b6f47;
            margin-bottom: 8px;
            line-height: 1.3;
            min-height: 45px;
        }

            font-size: 11px;
            color: #999;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .product-price {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: #d4a574;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .product-price-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 15px;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #20a853 100%);
            color: white;
            border: none;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .btn-whatsapp:active {
            transform: scale(0.96);
        }

        .btn-whatsapp:hover {
            background: linear-gradient(135deg, #20a853 0%, #1a8f43 100%);
        }

        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .footer {
            background: #2c2c2c;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            margin-top: 40px;
        }

            font-weight: 600;
            color: #d4a574;
        }

        .stats {

            padding: 15px;

        function renderProductos() {
            const container = document.getElementById("productsContainer");
            const statsDiv = document.getElementById("stats");
